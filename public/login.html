<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SJC Dashboard — Login</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    color: #e5e7eb;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #111827;
    border: 1px solid #1f2937;
    border-radius: 14px;
    padding: 40px 36px;
    width: 100%;
    max-width: 360px;
    text-align: center;
  }
  .logo {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #9ca3af;
    margin-bottom: 6px;
  }
  h1 {
    font-size: 22px;
    font-weight: 700;
    color: #f9fafb;
    margin-bottom: 32px;
  }
  .error {
    background: #1f0a0a;
    border: 1px solid #7f1d1d;
    color: #f87171;
    font-size: 13px;
    padding: 10px 14px;
    border-radius: 8px;
    margin-bottom: 20px;
    display: none;
  }
  .error.show { display: block; }
  input[type="password"] {
    width: 100%;
    background: #0a0a0a;
    border: 1px solid #1f2937;
    border-radius: 8px;
    color: #f9fafb;
    font-size: 15px;
    padding: 12px 14px;
    margin-bottom: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="password"]:focus { border-color: #374151; }
  button {
    width: 100%;
    background: #c8ff00;
    color: #0a0a0a;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    padding: 12px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  button:hover { opacity: 0.88; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Steven James Consulting</div>
  <h1>Command Dashboard</h1>
  <div class="error" id="err">Incorrect password</div>
  <form id="loginForm">
    <input type="text" name="username" autocomplete="username" value="steven" style="display:none">
    <input type="password" id="pw" placeholder="Password" autofocus autocomplete="current-password">
    <button type="submit" id="btn">Sign in</button>
  </form>
</div>
<script>
  // Check for error param
  if (new URLSearchParams(window.location.search).get('e') === '1') {
    document.getElementById('err').classList.add('show');
  }
  document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('btn');
    const err = document.getElementById('err');
    const pw = document.getElementById('pw').value;
    btn.disabled = true;
    btn.textContent = 'Signing in…';
    err.classList.remove('show');
    const res = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw })
    });
    if (res.ok) {
      window.location.href = '/dashboard';
    } else {
      err.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  });
</script>
</body>
</html>
